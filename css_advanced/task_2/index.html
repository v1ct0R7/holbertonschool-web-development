<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="back-img">

    <!-- Navigation -->
    <nav>
        <a href="#">
            <img src="./images/Logo (2).png" alt="SmileSchool Logo">
        </a>

        <ul>
            <li><a href="#">COURSES</a></li>
            <li><a href="#">PRICING</a></li>
            <li><a href="#">LOGIN</a></li>
        </ul>
    </nav>

    <!-- Hero -->
    <div class="hero-content">

        <h1>Get schooled</h1>

        <p>
            <span>SMILES</span>
            <span>GRIN</span>
            <span>LAUGH</span>
        </p>

        <button>REGISTER FOR FREE</button>

    </div>

    <!-- Pros -->
    <div class="pros">

        <h2><span class="color">Learn</span> from the pros</h2>

        <div class="cards">

            <div class="card">
                <img src="./images/phillip.png" alt="Phillip Massey">

                <h3>Phillip Massey</h3>

                <span>Smile of the year</span>

                <span>2018 - 2019</span>
            </div>

            <div class="card">
                <img src="./images/nannie.png" alt="Nannie Lawrence">

                <h3>Nannie Lawrence</h3>

                <span>Best little smile</span>

                <span>2017</span>
            </div>

            <div class="card">
                <img src="./images/bruce.png" alt="Bruce Walters">

                <h3>Bruce Walters</h3>

                <span>Best Friend Smile</span>

                <span>Live performance 2019</span>
            </div>

            <div class="card">
                <img src="./images/henry.png" alt="Henry Hughes">

                <h3>Henry Hughes</h3>

                <span>24h smiles winner</span>

                <span>2016 - 2019</span>
            </div>

        </div>

    </div>

</header>

<main>

</main>

</html>
